# SearXNG Free Mode - 仅使用免费搜索引擎（网页抓取，无需 API Key）
#
# 使用方式:
#   export SEARXNG_SETTINGS_PATH=/path/to/settings-free.yml
#   python -m searx.webapp
#
# 或直接通过环境变量:
#   SEARXNG_SETTINGS_PATH=./config/settings-free.yml docker compose up

use_default_settings: true

general:
  instance_name: "SearXNG (Free)"
  enable_metrics: false
  debug: false

server:
  port: 8080
  bind_address: "0.0.0.0"
  secret_key: "ultrasecretkey"  # 请通过 SEARXNG_SECRET 环境变量覆盖
  limiter: false
  image_proxy: true
  method: POST

search:
  safe_search: 0
  autocomplete: ""
  default_lang: "auto"
  formats:
    - html

ui:
  default_theme: simple
  default_locale: ""
  theme_args:
    simple_style: auto
  hotkeys: default

outgoing:
  request_timeout: 10.0
  pool_connections: 200
  pool_maxsize: 100
  enable_http2: true

# 移除不适用的引擎（torrent、区域性引擎等），调优部分引擎
engines:

  # --- 移除种子/版权风险引擎 ---
  - name: piratebay
    disabled: true
  - name: kickass
    disabled: true
  - name: solidtorrents
    disabled: true
  - name: 1337x
    disabled: true
  - name: btdigg
    disabled: true
  - name: nyaa
    disabled: true
  - name: tokyotoshokan
    disabled: true

  # --- 移除区域性中文引擎（中国大陆不可用或不需要） ---
  - name: baidu
    disabled: true
  - name: baidu images
    disabled: true
  - name: sogou
    disabled: true
  - name: sogou images
    disabled: true
  - name: sogou videos
    disabled: true
  - name: sogou wechat
    disabled: true

  # --- 移除需要 API Key 或不稳定的引擎 ---
  - name: bing
    disabled: true
  - name: mojeek
    disabled: true
  - name: presearch
    disabled: true
  - name: qwant
    disabled: true
  - name: yandex
    disabled: true
  - name: yandex images
    disabled: true

  # --- 启用一些默认禁用但免费好用的引擎 ---
  - name: duckduckgo images
    disabled: false
  - name: duckduckgo videos
    disabled: false
  - name: duckduckgo news
    disabled: false
  - name: duckduckgo weather
    disabled: false
  - name: qwant images
    disabled: false
  - name: qwant videos
    disabled: false
  - name: qwant news
    disabled: false

  # --- 启用一些免费的通用/百科引擎 ---
  - name: wikibooks
    disabled: false
  - name: wikiquote
    disabled: false
  - name: wikisource
    disabled: false
  - name: wikiversity
    disabled: false
  - name: wikivoyage
    disabled: false
  - name: wiby
    disabled: false
  - name: mozhi
    disabled: false

  # --- 新增免费引擎配置 ---

  - name: artic
    disabled: false

  - name: openlibrary
    disabled: false

  - name: pixabay images
    disabled: false

  - name: peertube
    disabled: false
    categories: videos

  - name: rumble
    disabled: false
    categories: videos
